name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: datamind-backend
  REPO_NAME: datamind-repo

jobs:
  # 1. Validation du Frontend
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Build check
        run: cd frontend && npm run build

  # 2. Validation du Backend
  test-backend:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: "dummy_key"
      LLM_MODEL: "llama-3.3-70b-versatile"
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run basic tests
        run: |
          cd backend
          pytest test_basic.py

  # 3. Build et Déploiement du Backend sur GCP
  deploy-backend:
    needs: [build-frontend, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: DataMind-Secrets
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:${{ github.sha }} ./backend
          docker push ${{ env.REGION }}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image ${{ env.REGION }}-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --cpu-boost \
            --timeout=300 \
            --set-env-vars "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},DATABASE_URL=${{ secrets.DATABASE_URL }},LLM_MODEL=${{ secrets.LLM_MODEL }}"
